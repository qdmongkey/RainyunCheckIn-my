name: Rainyun Auto Check-in

on:
  schedule:
    - cron: '0 0 * * *'        # 每天 UTC 0:00 (北京时间 8:00)
  workflow_dispatch:              # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 写入API密钥
        run: |
          echo '{"auth":{"x-api-key":"${{ secrets.RAINYUN_API_KEY }}"}}' > config.json
      - run: python app.py check_in --auto --force
